spring:
  application:
    name: articluate

  model:
    chat: google-genai

  ai:
    google:
      genai:
        # Gemini API key — set via GEMINI_API_KEY environment variable or override here
        api-key: ${GEMINI_API_KEY:change-me}
        chat:
          model: gemini-2.5-flash
          temperature: 0.7

server:
  port: 8080

articluate:
  ai:
    # 0 disables capping. Set e.g. 12000 to test whether large prompts trigger provider 500s.
    max-transcript-chars: 12000
  transcript-cache:
    dir: .data

logging:
  level:
    com.teggr.articluate: INFO
