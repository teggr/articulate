spring:
  application:
    name: articulate

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:articulate}
      password: ${SPRING_SECURITY_USER_PASSWORD:change-me}

  model:
    chat: google-genai

  ai:
    google:
      genai:
        # Gemini API key — set via GEMINI_API_KEY environment variable or override here
        api-key: ${GEMINI_API_KEY:change-me}
        chat:
          model: gemini-2.5-flash
          temperature: 0.7

server:
  port: 8080

articulate:
  ai:
    # 0 disables capping. Set e.g. 12000 to test whether large prompts trigger provider 500s.
    max-transcript-chars: 0
  data:
    dir: .data

logging:
  level:
    com.teggr.articulate: INFO

supadata:
  api-key: ${SUPADATA_API_KEY:}
  base-url: ${SUPADATA_BASE_URL:https://api.supadata.ai/v1}
  poll:
    max-attempts: ${SUPADATA_POLL_MAX_ATTEMPTS:10}
    interval-ms: ${SUPADATA_POLL_INTERVAL_MS:1000}
