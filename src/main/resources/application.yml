spring:
  application:
    name: articluate

  ai:
    openai:
      # Gemini API key — set via GEMINI_API_KEY environment variable or override here
      api-key: ${GEMINI_API_KEY:change-me}
      # Gemini's OpenAI-compatible endpoint
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.7
      # Embeddings are not used; point at the same base URL to satisfy auto-configuration
      embedding:
        base-url: https://generativelanguage.googleapis.com/v1beta/openai/

server:
  port: 8080

logging:
  level:
    com.teggr.articluate: INFO
